<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArbreViz — Projet NSI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #22d3ee;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .blob {
            position: fixed; width: 500px; height: 500px;
            background: var(--primary); filter: blur(120px);
            border-radius: 50%; z-index: -1; opacity: 0.15;
            animation: move 20s infinite alternate;
        }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }

        nav {
            position: sticky; top: 20px; margin: 0 2rem; padding: 1rem 2rem;
            background: var(--glass); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 16px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .logo { font-weight: 800; font-size: 1.5rem; background: linear-gradient(to right, var(--accent), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { max-width: 1200px; margin: 4rem auto; padding: 0 20px; display: grid; grid-template-columns: 350px 1fr; gap: 2rem; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        .glass-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 2rem; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h2 { margin-bottom: 1.5rem; font-weight: 700; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; }
        input, select { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 0.8rem; border-radius: 12px; color: white; font-family: 'Fira Code', monospace; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }

        .btn { width: 100%; padding: 1rem; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        /* --- DESIGN DES NŒUDS (CORRIGÉ) --- */
        #tree-svg { width: 100%; height: 100%; min-height: 400px; }
        
        .node-group { cursor: default; }
        .node-circle {
            fill: #1e1b4b;
            stroke: var(--accent);
            stroke-width: 2;
            transition: all 0.4s ease; /* Transition douce */
        }
        
        /* Animation Hover zen */
        .node-group:hover .node-circle {
            fill: var(--accent);
            stroke: #fff;
            filter: drop-shadow(0 0 8px var(--accent));
        }

        .node-text {
            fill: white;
            font-size: 12px;
            font-weight: 600;
            text-anchor: middle;
            dominant-baseline: central;
            transition: fill 0.4s ease;
        }
        
        .node-group:hover .node-text { fill: #0f172a; }

        .branch {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 1.5;
            stroke-linecap: round;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 1.5rem; }
        .stat-item { background: rgba(255,255,255,0.02); padding: 1rem; border-radius: 16px; border: 1px solid var(--glass-border); }
        .stat-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }
        .stat-value { font-size: 1.2rem; font-weight: 700; color: var(--accent); }

        .traversal-box { margin-top: 1.5rem; padding: 1rem; background: #00000044; border-radius: 12px; font-family: 'Fira Code', monospace; font-size: 0.85rem; border-left: 4px solid var(--secondary); }
    </style>
</head>
<body>

    <div class="blob"></div>

        <div style="font-size: 0.8rem; opacity: 0.5;">Projet Terminale NSI</div>

        </aside>

        <main class="viz-area">

                    </div>
                </div>

                <div class="traversal-box">
                    <strong>Parcours Infixé :</strong> <span id="res-infix" style="color: var(--accent);">[]</span>
                </div>
            </div>
        </main>
    </div>
