<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- Encodage en UTF-8 et prise en charge du responsive -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Titre et icone de la page -->
    <title>ArbreViz</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Intégration du fichier des styles -->
    <link rel="stylesheet" href="./style.css">
    <!-- Google Fonts - Pour la police Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- PyScript - Pour le python-->
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    <!-- SVG Zoom : https://github.com/anvaka/panzoom - Pour zoomer dans le svg (l'arbre) -->
    <script src='https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js'></script>
</head>
<body>
    <!-- Rond fixé en arrière plan pour ajouter un effet de couleur -->
    <div id="blob"></div>

    <!-- Barre de navigation avec le logo, le titre et la description -->
    <nav>
        <div>
            <svg onclick="window.location.reload()" width="38.391" height="38.391" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16 26V14M16 20L22 16M16 18L10 14" stroke="white" stroke-width="2.5" stroke-linecap="round"/><circle cx="16" cy="9" r="5" fill="var(--accent)"/><circle cx="23" cy="15" r="4" fill="var(--secondary)"/><circle cx="9" cy="13" r="3.5" fill="var(--third)"/> </svg>
            <h1 onclick="window.location.reload()">ArbreViz</h1>
        </div>
        <p>Projet NSI</p>
        <svg id="nav_settings" xmlns="http://www.w3.org/2000/svg" height="35px" viewBox="0 -960 960 960" width="35px"><defs><linearGradient id="grad-settings" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="var(--accent)" /><stop offset="100%" stop-color="var(--secondary)" /></linearGradient></defs><path fill="url(#grad-settings)" d="m382-80-18.67-126.67q-17-6.33-34.83-16.66-17.83-10.34-32.17-21.67L178-192.33 79.33-365l106.34-78.67q-1.67-8.33-2-18.16-.34-9.84-.34-18.17 0-8.33.34-18.17.33-9.83 2-18.16L79.33-595 178-767.67 296.33-715q14.34-11.33 32.34-21.67 18-10.33 34.66-16L382-880h196l18.67 126.67q17 6.33 35.16 16.33 18.17 10 31.84 22L782-767.67 880.67-595l-106.34 77.33q1.67 9 2 18.84.34 9.83.34 18.83 0 9-.34 18.5Q776-452 774-443l106.33 78-98.66 172.67-118-52.67q-14.34 11.33-32 22-17.67 10.67-35 16.33L578-80H382Zm55.33-66.67h85l14-110q32.34-8 60.84-24.5T649-321l103.67 44.33 39.66-70.66L701-415q4.33-16 6.67-32.17Q710-463.33 710-480q0-16.67-2-32.83-2-16.17-7-32.17l91.33-67.67-39.66-70.66L649-638.67q-22.67-25-50.83-41.83-28.17-16.83-61.84-22.83l-13.66-110h-85l-14 110q-33 7.33-61.5 23.83T311-639l-103.67-44.33-39.66 70.66L259-545.33Q254.67-529 252.33-513 250-497 250-480q0 16.67 2.33 32.67 2.34 16 6.67 32.33l-91.33 67.67 39.66 70.66L311-321.33q23.33 23.66 51.83 40.16 28.5 16.5 60.84 24.5l13.66 110Zm43.34-200q55.33 0 94.33-39T614-480q0-55.33-39-94.33t-94.33-39q-55.67 0-94.5 39-38.84 39-38.84 94.33t38.84 94.33q38.83 39 94.5 39ZM480-480Z"/></svg>
    </nav>

    <!-- Conteneur principal de la page -->
    <div id="container">
        <!-- Boite à outils pour la configuration sur le côté -->
        <aside id="toolbox">
            <!-- Titre -->
            <h2>Configuration</h2>
            <!-- Partie avec le formulaire permettant de renseigner l'arbre ainsi que le type de l'arbre -->
            <div class="toolbox_bloc">
                <h3>Valeurs et Type de l'arbre</h3>
                <form id="form_values_type" method="dialog">
                    <input type="text" id="input_values" required>
                    <select name="type" id="input_type" required>
                        <option value="" disabled selected>Sélection du type</option>
                        <option value="default">Arbre Binaire</option>
                        <option value="search">Arbre Binaire de Recherche</option>
                    </select>
                    <button type="submit">Générer l'Arbre</button>
                </form>
            </div>
            <!-- Partie avec le formulaire permettant la recherche d'une valeur dans le cas d'un ABR -->
            <div class="toolbox_bloc display_none" id="search_div">
                <h3>Rechercher une valeur</h3>
                <form id="form_search" method="dialog">
                    <input type="number" id="input_search" required>
                    <button type="submit">Rechercher</button>
                </form>
            </div>
            <!-- Partie avec le formulaire permettant de sélectionner le parcours de l'arbre -->
            <div class="toolbox_bloc display_none" id="browse_div">
                <h3>Parcourir l'arbre</h3>
                <form id="form_browse" method="dialog">
                    <select id="input_browse" required>
                        <option value="" disabled selected>Sélection du parcours</option>
                        <option value="prefixe">Préfixe</option>
                        <option value="infixe">Infixe</option>
                        <option value="suffixe">Suffixe</option>
                        <option value="largeur">Largeur</option>
                    </select>
                    <button type="submit">Parcourir</button>
                </form>
            </div>
        </aside>
        <!-- Partie principale avec le svg (l'arbre) et les informations associés -->
        <main id="content">
            <!-- Titre -->
            <h2>Affichage de l'arbre : <span id="display_values"></span></h2>
            <!-- L'arbre -->
            <div id="tree_container">
                <svg id="tree" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
                    <!-- Le conteneur principal -->
                    <g id="tree_content">
                        <!-- Conteneur des liens entre les éléments -->
                        <g id="tree_links"></g>
                        <!-- Conteneur des éléments -->
                        <g id="tree_nodes"></g>
                    </g>
                </svg>
                <svg id="reset_view" onclick="window.init_panzoom()" xmlns="http://www.w3.org/2000/svg" height="30px" viewBox="0 -960 960 960" width="30px"><defs><linearGradient id="grad-reset" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="var(--accent)" /><stop offset="100%" stop-color="var(--secondary)" /></linearGradient></defs><path fill="url(#grad-reset)" d="M444-72v-150l-33 33-51-51 120-120 120 120-51 51-33-33v150h-72ZM240-360l-51-51 33-33H72v-72h150l-33-33 51-51 120 120-120 120Zm480 0L600-480l120-120 51 51-33 33h150v72H738l33 33-51 51Zm-240-60q-25 0-42.5-17.5T420-480q0-25 17.5-42.5T480-540q25 0 42.5 17.5T540-480q0 25-17.5 42.5T480-420Zm0-180L360-720l51-51 33 33v-150h72v150l33-33 51 51-120 120Z"/></svg>
            </div>
            <!-- Conteneur des détails de l'arbre -->
            <div id="stats_container">
                <!-- Hauteur de l'arbre -->
                <div>
                    <h3>Hauteur</h3>
                    <p id="height">-</p>
                </div>
                <!-- Taille de l'arbre -->
                <div>
                    <h3>Taille</h3>
                    <p id="size">-</p>
                </div>
            </div>
            <!-- Conteneur du parcours de l'arbre -->
            <div id="browse_container">
                <p><strong>Parcours <span id="display_browse_type"></span> :</strong> <span id="display_browse_list"></span></p>
            </div>
        </main>
    </div>

    <!-- Bas de page avec le copyright -->
    <footer>© 2026 : Romain THIBEAUD et Cédric VILLEMONAIS</footer>

    <!-- Script permettant le zoom dans le svg (l'arbre) -->
    <script>
        // Fonction pour initialiser/réinitialiser panzoom
        window.init_panzoom = function() {
            // Disposer l'ancienne instance si elle existe
            if (window.panzoom_instance) {
                window.panzoom_instance.dispose();
            }
            
            // Créer une nouvelle instance
            window.panzoom_instance = panzoom(document.getElementById("tree_content"), {
                autocenter: true,
                bounds: true,
                boundsPadding: 0.05,
                transformOrigin: {x: 0.5, y: 0.5}
            });
        };
        
        // Initialiser au chargement
        window.init_panzoom();
    </script>
    
    <!-- Intégration du script python -->
    <script type="py" src="./main.py" config="./pyscript.toml"></script>
</body>
</html>
